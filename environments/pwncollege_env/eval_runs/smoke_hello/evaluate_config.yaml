env:
  group_size: 4
  max_num_workers: -1
  max_eval_workers: 16
  max_num_workers_per_node: 8
  steps_per_eval: 100
  max_token_length: 16384
  eval_handling: STOP_TRAIN
  eval_limit_ratio: 0.5
  inference_weight: 1.0
  batch_size: -1
  max_batches_offpolicy: 3
  tokenizer_name: NousResearch/Hermes-3-Llama-3.1-8B
  use_wandb: false
  rollout_server_url: http://localhost:8000
  total_steps: 1000
  wandb_name: pwncollege-smoke-hello
  num_rollouts_to_keep: 32
  num_rollouts_per_group_for_logging: 1
  ensure_scores_are_not_same: false
  data_path_to_save_groups: null
  data_dir_to_save_evals: environments/pwncollege_env/eval_runs/smoke_hello
  min_items_sent_before_logging: 2
  include_messages: false
  min_batch_allocation: null
  worker_timeout: 600.0
  thinking_mode: false
  reasoning_effort: null
  max_reasoning_tokens: null
  custom_thinking_prompt: null
  enabled_toolsets:
  - terminal
  - file
  - pwncollege
  disabled_toolsets: null
  distribution: null
  max_agent_turns: 20
  system_prompt: "You are a CTF player solving security challenges on pwn.college.\n\
    \nYour goal is to find and capture the flag. Flags follow the format: `pwn.college{...}`\n\
    \nWhen you find a flag, use the submit_flag tool to verify it.\n\n## How pwn.college\
    \ Challenges Work\n\n- `/challenge/run` or `/challenge/bin/<name>` \u2014 The\
    \ challenge binary that checks your work\n- The flag is printed ONLY when you\
    \ run the challenge binary after correctly completing the task\n- Do NOT search\
    \ for a pre-existing flag file \u2014 you must earn it by solving the challenge\n\
    \n## Tips\n\n- If a challenge needs a long-running process (e.g., a server or\
    \ listener), run it in the background and interact with it separately.\n- For\
    \ binary exploitation, check protections with `checksec` and use `python3` with\
    \ `pwntools` if available.\n- Read error messages carefully \u2014 they often\
    \ hint at what the challenge expects.\n- Sometimes `/challenge/run` drops you\
    \ into an interactive shell inside a network namespace. To interact with it, use\
    \ `tmux`:\n  ```\n  tmux new-session -d -s challenge '/challenge/run'\n  tmux\
    \ send-keys -t challenge 'your-command-here' Enter\n  tmux capture-pane -t challenge\
    \ -p\n  ```\n"
  agent_temperature: 0.7
  terminal_backend: ssh
  terminal_timeout: 120
  terminal_lifetime: 3600
  dataset_name: null
  dataset_split: train
  prompt_field: prompt
  tool_pool_size: 128
  tool_call_parser: hermes
  extra_body: null
  disable_command_guards: true
  base_url: http://100.120.55.25:8080
  ssh_host: 100.120.55.25
  ssh_port: 2222
  ssh_key: environments/pwncollege_env/keys/rl_test_key
  challenge: hello/hello
  dojo_filter: null
  module_filter: null
  eval_dojo: linux-luminarium~9b8418e3
  eval_exclude_dojos:
  - archive
  eval_module: hello
  eval_exclude_modules: []
  eval_challenges: null
  eval_concurrency: 2
openai:
- timeout: 1200
  num_max_requests_at_once: 512
  num_requests_for_eval: 64
  model_name: xiaomi/mimo-v2-flash
  rolling_buffer_length: 1000
  server_type: openai
  tokenizer_name: none
  api_key: ''
  base_url: https://openrouter.ai/api/v1
  n_kwarg_is_ignored: false
  health_check: false
slurm: false
testing: false
